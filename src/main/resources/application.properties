spring.application.name=irctc-backend
SERVER_PORT=${PORT:8080}

# ===============================
# LOGGING
# ===============================
logging.level.org.springdoc=INFO
logging.level.org.springframework.web=INFO

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/irctc}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:9a31a986cb6c85587fde08f1b6238b1f5f3e46b074a10e14ad11db1e23a6fbd4}
jwt.expiration=86400000

# ===============================
# GOOGLE OAUTH2 CONFIG
# ===============================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:mock-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:mock-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===============================
# MAIL CONFIG (GMAIL SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:mock}
spring.mail.password=${MAIL_PASSWORD:mock}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# RAZORPAY CONFIG
# ===============================
razorpay.key.id=${RAZORPAY_KEY_ID:mock}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:mock}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:mock}

# ===============================
# OAUTH2 REDIRECT
# ===============================
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:2026/login-success}

# ===============================
# INDIAN RAILWAY RAPID API
# ===============================
railway.api.key=${RAPIDAPI_KEY:mock}
railway.api.host=${RAPIDAPI_HOST:mock}
railway.api.base-url=${RAPIDAPI_BASE_URL:mock}

# ===============================
# SPRING BOOT ACTUATOR CONFIG
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===============================
# REDIS CACHING CONFIG
# ===============================
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.redis.time-to-live=600000