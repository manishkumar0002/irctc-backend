spring.application.name=irctc-backend-test
PORT=8080

# Database
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Cache
spring.cache.type=simple

# JWT
jwt.secret=9a31a986cb6c85587fde08f1b6238b1f5f3e46b074a10e14ad11db1e23a6fbd4
jwt.expiration=86400000

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=mock-client-id
spring.security.oauth2.client.registration.google.client-secret=mock-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# Mail
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=mock
spring.mail.password=mock

# Razorpay
razorpay.key.id=mock
razorpay.key.secret=mock
razorpay.webhook.secret=mock

# OAuth redirect
app.oauth2.redirect-uri=http://localhost:8080/login-success

# Railway Rapid API
railway.api.key=mock
railway.api.host=mock
railway.api.base-url=mock
